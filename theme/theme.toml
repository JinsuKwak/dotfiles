active_set = "mocha"
default_set = "mocha"

[ui]
font_family = "JetBrainsMono Nerd Font"
font_size = 14
background_opacity = 0.88
background_blur = 20
background_opacity_cells = false
copy_on_select = "clipboard"
clipboard_read = "allow"
clipboard_write = "allow"
title = " "
window_decoration = "auto"
macos_window_buttons = "visible"
macos_titlebar_proxy_icon = "hidden"
window_padding_x = 8
window_padding_y = 8
shell_integration = "detect"
shell_integration_features = "cursor,no-sudo,no-ssh-env,no-ssh-terminfo,path"
macos_option_as_alt = "left"
mouse_hide_while_typing = true
quick_terminal_keybind = "global:cmd+grave_accent=toggle_quick_terminal"
new_tab_keybind = "cmd+t=new_tab"
close_surface_keybind = "cmd+w=close_surface"
fullscreen_keybind = "cmd+enter=toggle_fullscreen"
nvim_transparent_background = true

[tokens]
background = "background"
foreground = "foreground"
muted = "muted"
selection = "selection"
surface = "surface"
surface_alt = "surface_alt"
primary = "primary"
secondary = "secondary"
accent = "accent"
success = "success"
on_accent = "on_accent"
ghostty_dark = "ghostty_dark"
ghostty_light = "ghostty_light"
nvim_colorscheme = "nvim_colorscheme"
tmux_flavor = "tmux_flavor"
tv_theme = "tv_theme"

[ghostty]
theme_dark = "ghostty_dark"
theme_light = "ghostty_light"
background = "background"
foreground = "foreground"

[tv]
theme = "tv_theme"
background = "transparent"
text_fg = "foreground"
selection_bg = "selection"

[nvim]
colorscheme = "nvim_colorscheme"

[tmux]
flavor = "tmux_flavor"
status_left_padding = " "
status_right_padding = " "
pill_left = ""
pill_right = ""
pill_gap = " "
icon_fg = "on_accent"
text_fg = "foreground"
text_bg = "surface"
session_icon_bg = "primary"
window_icon_bg = "surface_alt"
window_current_icon_bg = "primary"
directory_icon_bg = "secondary"
time_icon_bg = "accent"
session_icon = ""
session_text = "#S"
window_text = "#W"
window_current_text = "#W#{?window_zoomed_flag,(),}"
directory_icon = "󰉋"
directory_text = "#(sh ~/.config/tmux/scripts/current-path.sh '#{pane_current_path}')"
time_icon = "󰥔"
time_text = "%H:%M"

