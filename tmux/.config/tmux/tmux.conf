source-file ~/.config/tmux/tmux.reset.conf

set-option -g default-terminal "tmux-256color"
set-option -as terminal-features ",xterm-256color:RGB"
set-environment -g TMUX_PLUGIN_MANAGER_PATH "~/.local/share/tmux/plugins/"

unbind C-b
set -g prefix C-a
bind C-a send-prefix
set -g base-index 1
setw -g pane-base-index 1
set -g detach-on-destroy off
set -g escape-time 0
set -g focus-events on
set -g history-limit 1000000
set -g mouse on
set -g renumber-windows on
set -g set-clipboard on
set -g status-position top
setw -g mode-keys vi
set -g pane-active-border-style "fg=magenta,bg=default"
set -g pane-border-style "fg=brightblack,bg=default"

bind | split-window -h -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind s choose-tree -Zs

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind c new-window -c "#{pane_current_path}"
bind n next-window
bind p previous-window
bind x kill-pane
bind X kill-window
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(n?vim|vim)'"
bind-key -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"
set -g @plugin "tmux-plugins/tmux-yank"
set -g @plugin "tmux-plugins/tmux-resurrect"
set -g @plugin "tmux-plugins/tmux-continuum"
set -g @plugin "sainnhe/tmux-fzf"
set -g @plugin "wfxr/tmux-fzf-url"
set -g @plugin "omerxx/tmux-sessionx"
set -g @plugin "omerxx/tmux-floax"
set -g @plugin "catppuccin/tmux#v2.3.0"

set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit "2000"

set -g @floax-width "80%"
set -g @floax-height "80%"
set -g @floax-border-color "magenta"
set -g @floax-text-color "blue"
set -g @floax-bind "P"
set -g @floax-bind-menu "M"
set -g @floax-change-path "true"

set -g @sessionx-bind "o"
set -g @sessionx-bind-zo-new-window "ctrl-y"
set -g @sessionx-auto-accept "off"
set -g @sessionx-custom-paths "~/dotfiles"
set -g @sessionx-custom-paths-subdirectories "false"
set -g @sessionx-filter-current "false"
set -g @sessionx-window-height "85%"
set -g @sessionx-window-width "75%"
set -g @sessionx-x-path "~/dotfiles"
set -g @sessionx-zoxide-mode "on"

set -g @continuum-restore "off"
set -g @resurrect-strategy-nvim "session"
set -g @resurrect-strategy-vim "session"
source-file ~/.config/tmux/theme.conf
if-shell '[ -f ~/.local/share/tmux/plugins/tmux/catppuccin.tmux ]' \
  'run-shell ~/.local/share/tmux/plugins/tmux/catppuccin.tmux'
run-shell "~/.local/share/tmux/plugins/tpm/tpm"
run-shell "sh ~/.config/tmux/apply-theme.sh"
