add_newline = true
command_timeout = 1000
palette = "catppuccin_mocha"

format = "$directory$git_branch$git_status$fill${custom.mise_tools}$status\n$character"
right_format = "$aws$kubernetes$cmd_duration"

[directory]
truncation_length = 999
truncate_to_repo = false
truncation_symbol = ""
style = "bold lavender"

[git_branch]
symbol = " "
style = "bold mauve"
format = " [$symbol$branch]($style)"

[git_status]
style = "bold yellow"
format = "([ $all_status$ahead_behind]($style))"

[cmd_duration]
min_time = 500
format = "[󰥔](bold yellow) [$duration](bold yellow)"

[fill]
symbol = " "

[custom.mise_tools]
command = "sh ~/.config/starship/scripts/mise-tools.sh"
when = "command -v mise >/dev/null 2>&1 && mise current 2>/dev/null | grep -q ."
shell = ["sh"]
format = "[$output](bold green) "
description = "Show only tools currently activated by mise"

[python]
symbol = " "
format = "[${symbol}${version}]($style) "
style = "bold green"

[nodejs]
symbol = " "
format = "[${symbol}${version}]($style) "
style = "bold green"

[time]
disabled = true
time_format = "%H:%M"
format = "[󰥔 $time]($style)"
style = "bold sky"

[aws]
disabled = false
force_display = false
symbol = "󰸏 "
format = '[$symbol profile: "$profile"( \(region: $region\))]($style) '
style = "bold blue"

[kubernetes]
disabled = false
symbol = "󱃾 "
format = '[$symbol$context( \($namespace\))]($style) '
style = "bold cyan"

[status]
disabled = false
format = "$symbol "
symbol = "[❯](bold red)"
success_symbol = "[❯](bold green)"
not_executable_symbol = "[❯](bold red)"
not_found_symbol = "[❯](bold red)"
sigint_symbol = "[❯](bold yellow)"
signal_symbol = "[❯](bold red)"
map_symbol = true
recognize_signal_code = true

[character]
success_symbol = "[➜](bold green)"
error_symbol = "[➜](bold red)"
vimcmd_symbol = "[N](bold mauve)"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
